<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한화생명 보험 상담 챗봇</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #FF6B00;
  --primary-dark: #E55A00;
  --primary-light: #FFF3E8;
  --bg: #F5F5F5;
  --white: #FFFFFF;
  --gray-100: #F8F9FA;
  --gray-200: #E9ECEF;
  --gray-300: #DEE2E6;
  --gray-500: #ADB5BD;
  --gray-700: #495057;
  --gray-900: #212529;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--gray-900);
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ── Container ── */
#app {
  width: 100%;
  max-width: 480px;
  height: 100dvh;
  max-height: 900px;
  background: var(--white);
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow);
  position: relative;
}

@media (min-width: 481px) {
  #app { border-radius: 20px; height: 92dvh; }
}

/* ── Header ── */
.header {
  background: var(--primary);
  color: var(--white);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.header-avatar {
  width: 42px; height: 42px;
  background: var(--white);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.header-info h1 { font-size: 16px; font-weight: 700; }
.header-info p { font-size: 12px; opacity: 0.85; margin-top: 2px; }

/* ── Chat area ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

/* ── Messages ── */
.msg { display: flex; gap: 8px; max-width: 88%; animation: fadeIn 0.3s ease; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  background: var(--primary-light);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg.user .msg-avatar { display: none; }

.msg-bubble {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.msg.bot .msg-bubble {
  background: var(--gray-100);
  border-top-left-radius: 4px;
  color: var(--gray-900);
}
.msg.user .msg-bubble {
  background: var(--primary);
  color: var(--white);
  border-top-right-radius: 4px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Typing indicator ── */
.typing { display: flex; gap: 4px; padding: 4px 0; }
.typing span {
  width: 7px; height: 7px;
  background: var(--gray-500);
  border-radius: 50%;
  animation: blink 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
  30% { opacity: 1; transform: scale(1); }
}

/* ── Quick replies ── */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 4px 0 4px 40px;
  animation: fadeIn 0.3s ease;
}
.quick-btn {
  background: var(--white);
  color: var(--primary);
  border: 1.5px solid var(--primary);
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.quick-btn:hover {
  background: var(--primary);
  color: var(--white);
}

/* ── Product card ── */
.product-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 14px;
  margin-top: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.product-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(255,107,0,0.12); }
.product-card .card-category {
  display: inline-block;
  background: var(--primary-light);
  color: var(--primary);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 6px;
}
.product-card .card-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.product-card .card-desc { font-size: 12px; color: var(--gray-700); line-height: 1.5; }

/* ── Detail view ── */
.detail-section { margin-top: 8px; }
.detail-section h4 {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--gray-200);
}
.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 12.5px;
  line-height: 1.5;
}
.detail-row .label { color: var(--gray-700); flex-shrink: 0; margin-right: 8px; }
.detail-row .value { text-align: right; font-weight: 500; }

/* ── Comparison table ── */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 8px;
}
.compare-table th {
  background: var(--primary);
  color: var(--white);
  padding: 8px 6px;
  text-align: center;
  font-weight: 600;
}
.compare-table td {
  padding: 7px 6px;
  border-bottom: 1px solid var(--gray-200);
  text-align: center;
  line-height: 1.4;
}
.compare-table tr:nth-child(even) td { background: var(--gray-100); }
.compare-table td:first-child { font-weight: 600; text-align: left; background: var(--primary-light) !important; }

/* ── Scenario card ── */
.scenario-card {
  background: linear-gradient(135deg, var(--primary-light), var(--white));
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 14px;
  margin-top: 6px;
}
.scenario-card .persona { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.scenario-card .bg { font-size: 12px; color: var(--gray-700); line-height: 1.5; }
.scenario-card .rec-item {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 12.5px;
}
.scenario-card .rec-total {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--gray-300);
  font-weight: 700;
  font-size: 13px;
  text-align: right;
  color: var(--primary);
}

/* ── Input bar ── */
.input-bar {
  padding: 12px 16px;
  border-top: 1px solid var(--gray-200);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  background: var(--white);
}
.input-bar input {
  flex: 1;
  border: 1.5px solid var(--gray-300);
  border-radius: 24px;
  padding: 10px 16px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.input-bar input:focus { border-color: var(--primary); }
.input-bar button {
  width: 42px; height: 42px;
  background: var(--primary);
  color: var(--white);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
  flex-shrink: 0;
}
.input-bar button:hover { background: var(--primary-dark); }
.input-bar button svg { width: 20px; height: 20px; }

/* ── Premium highlight ── */
.premium-highlight {
  background: var(--primary-light);
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 6px;
  font-size: 13px;
}
.premium-highlight .amount { font-size: 18px; font-weight: 800; color: var(--primary); }

/* ── Feature list ── */
.feature-list { list-style: none; margin-top: 6px; }
.feature-list li {
  padding: 3px 0;
  font-size: 12.5px;
  line-height: 1.5;
}
.feature-list li::before {
  content: '✓ ';
  color: var(--primary);
  font-weight: 700;
}

/* ── Caution list ── */
.caution-list { list-style: none; margin-top: 6px; }
.caution-list li {
  padding: 3px 0;
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--gray-700);
}
.caution-list li::before {
  content: '! ';
  color: #E53935;
  font-weight: 700;
}

/* ── Tabs ── */
.tab-bar {
  display: flex;
  flex-shrink: 0;
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
}
.tab-btn {
  flex: 1;
  padding: 11px 0;
  border: none;
  background: none;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--gray-500);
  cursor: pointer;
  position: relative;
  transition: color 0.25s;
}
.tab-btn.active { color: var(--primary); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2.5px;
  background: var(--primary);
  border-radius: 2px;
}
.tab-btn .tab-icon { margin-right: 5px; }

/* ── Internal mode theme override ── */
#app.mode-internal .header { background: #1B2A4A; }
#app.mode-internal .tab-btn.active { color: #1B2A4A; }
#app.mode-internal .tab-btn.active::after { background: #1B2A4A; }
#app.mode-internal .msg.user .msg-bubble { background: #1B2A4A; }
#app.mode-internal .msg-avatar { background: #E8EDF5; }
#app.mode-internal .msg-avatar svg { stroke: #1B2A4A; }
#app.mode-internal .input-bar input:focus { border-color: #1B2A4A; }
#app.mode-internal .input-bar button { background: #1B2A4A; }
#app.mode-internal .input-bar button:hover { background: #152238; }
#app.mode-internal .quick-btn { color: #1B2A4A; border-color: #1B2A4A; }
#app.mode-internal .quick-btn:hover { background: #1B2A4A; color: var(--white); }
#app.mode-internal .detail-section h4 { color: #1B2A4A; }
#app.mode-internal .compare-table th { background: #1B2A4A; }
#app.mode-internal .compare-table td:first-child { background: #E8EDF5 !important; }
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header">
    <div class="header-avatar" id="headerAvatar">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#FF6B00" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="header-info">
      <h1 id="headerTitle">한화생명 보험 상담</h1>
      <p id="headerDesc">보험 고민? 나한테 맡겨!</p>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-mode="customer">
      <span class="tab-icon">&#x1f4ac;</span>고객 상담
    </button>
    <button class="tab-btn" data-mode="internal">
      <span class="tab-icon">&#x1f4cb;</span>사내 업무
    </button>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-bar">
    <input type="text" id="userInput" placeholder="궁금한 거 아무거나 물어봐!" autocomplete="off">
    <button id="sendBtn" aria-label="전송">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ── Mode & Conversation state ──
let currentMode = 'customer';
const histories = { customer: [], internal: [] };
const chatStates = { customer: null, internal: null };

const MODE_CONFIG = {
  customer: {
    title: '한화생명 보험 상담',
    desc: '보험 고민? 나한테 맡겨!',
    placeholder: '궁금한 거 아무거나 물어봐!',
    greeting: '안녕! 나는 한화생명 AI 보험 상담사 <b>하나</b>야~ 보험 관련 궁금한 거 뭐든 편하게 물어봐!',
    quickReplies: [
      '보험상품 전체 알려줘',
      '나한테 맞는 보험 추천해줘',
      '암보험이랑 건강보험 차이가 뭐야?',
      '월 20만원 예산에 맞는 보험 추천',
      '보험금 청구는 어떻게 해?'
    ],
    errorMsg: '미안, 지금 연결이 잘 안 되고 있어! 잠시 후에 다시 시도해줘~',
    avatarStroke: '#FF6B00'
  },
  internal: {
    title: '사내 업무 어시스턴트',
    desc: 'H-Assistant | 사내 규정 검색',
    placeholder: '규정, 심사 기준, 프로세스 등을 검색하세요.',
    greeting: '<b>H-Assistant</b>입니다. 인수심사 기준, 보험금 청구/지급 프로세스, 민원 처리 절차, 상품 규정 등을 안내합니다. 질문을 입력해 주세요.',
    quickReplies: [
      '고혈압 고객 인수심사 기준',
      '보험금 지급 프로세스',
      '민원 에스컬레이션 절차',
      '암보험 vs 건강보험 보장 비교',
      '비흡연체 할인 조건'
    ],
    errorMsg: '서버 연결 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.',
    avatarStroke: '#1B2A4A'
  }
};

// ── DOM helpers ──
const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

function addMessage(content, sender = 'bot', isHTML = false) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${sender}`;

  if (sender === 'bot') {
    wrap.innerHTML = `<div class="msg-avatar"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#FF6B00" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>`;
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (isHTML) {
    bubble.innerHTML = content;
  } else {
    bubble.textContent = content;
  }
  wrap.appendChild(bubble);
  chatArea.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typingIndicator';
  wrap.innerHTML = `
    <div class="msg-avatar"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#FF6B00" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  chatArea.appendChild(wrap);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function addQuickReplies(options) {
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = opt.label;
    btn.addEventListener('click', () => {
      const allQR = chatArea.querySelectorAll('.quick-replies');
      allQR.forEach(qr => qr.remove());
      addMessage(opt.label, 'user');
      delayedReply(() => opt.action());
    });
    wrap.appendChild(btn);
  });
  chatArea.appendChild(wrap);
  scrollToBottom();
}

// ── Markdown → HTML converter (lightweight) ──
function md(text) {
  let html = text
    // Tables
    .replace(/^(\|.+\|)\n(\|[\s\-:|]+\|)\n((?:\|.+\|\n?)+)/gm, (_, header, sep, body) => {
      const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
      const rows = body.trim().split('\n').map(row => {
        const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
      return `<table class="compare-table"><tr>${ths}</tr>${rows}</table>`;
    })
    // Headers
    .replace(/^### (.+)$/gm, '<h4 style="font-size:13px;font-weight:700;color:var(--primary);margin:10px 0 6px;">$1</h4>')
    .replace(/^## (.+)$/gm, '<h3 style="font-size:14px;font-weight:700;margin:10px 0 6px;">$1</h3>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    // Unordered list
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Ordered list
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Line breaks
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');

  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*?<\/li><br>?)+)/g, (match) => {
    return '<ul class="feature-list">' + match.replace(/<br>/g, '') + '</ul>';
  });

  return html;
}

// ── Send message to Claude API ──
let isWaiting = false;

async function sendToAPI(userText) {
  const hist = histories[currentMode];
  hist.push({ role: 'user', content: userText });

  showTyping();
  setInputEnabled(false);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: hist, mode: currentMode })
    });

    hideTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `API error ${res.status}`);
    }

    const data = await res.json();
    const cfg = MODE_CONFIG[currentMode];
    const reply = data.reply || (currentMode === 'customer' ? '응답을 받지 못했어. 다시 시도해줘!' : '응답을 받지 못했습니다.');

    hist.push({ role: 'assistant', content: reply });
    addMessage(md(reply), 'bot', true);

  } catch (err) {
    hideTyping();
    console.error('API Error:', err);
    addMessage(MODE_CONFIG[currentMode].errorMsg, 'bot');
  } finally {
    setInputEnabled(true);
    userInput.focus();
  }
}

function setInputEnabled(enabled) {
  isWaiting = !enabled;
  userInput.disabled = !enabled;
  sendBtn.disabled = !enabled;
  sendBtn.style.opacity = enabled ? '1' : '0.5';
}

// ── Quick reply sends text to API ──
function addQuickReplies(options) {
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => {
      chatArea.querySelectorAll('.quick-replies').forEach(qr => qr.remove());
      addMessage(opt, 'user');
      sendToAPI(opt);
    });
    wrap.appendChild(btn);
  });
  chatArea.appendChild(wrap);
  scrollToBottom();
}

// ── Input handling ──
function handleSend() {
  const text = userInput.value.trim();
  if (!text || isWaiting) return;
  userInput.value = '';

  chatArea.querySelectorAll('.quick-replies').forEach(qr => qr.remove());
  addMessage(text, 'user');
  sendToAPI(text);
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.isComposing) handleSend();
});

// ── Mode switching ──
function switchMode(mode) {
  if (mode === currentMode && chatStates[mode]) return;

  // Save current chat state
  chatStates[currentMode] = chatArea.innerHTML;

  currentMode = mode;
  const cfg = MODE_CONFIG[mode];
  const app = document.getElementById('app');

  // Theme
  app.className = mode === 'internal' ? 'mode-internal' : '';

  // Header
  document.getElementById('headerTitle').textContent = cfg.title;
  document.getElementById('headerDesc').textContent = cfg.desc;
  document.getElementById('headerAvatar').querySelector('svg').setAttribute('stroke', cfg.avatarStroke);

  // Input
  userInput.placeholder = cfg.placeholder;

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  // Restore or init chat
  if (chatStates[mode] !== null) {
    chatArea.innerHTML = chatStates[mode];
  } else {
    chatArea.innerHTML = '';
    addMessage(cfg.greeting, 'bot', true);
    addQuickReplies(cfg.quickReplies);
  }

  scrollToBottom();
  userInput.focus();
}

// Tab click handlers
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

// ── Init ──
function init() {
  const cfg = MODE_CONFIG.customer;
  addMessage(cfg.greeting, 'bot', true);
  addQuickReplies(cfg.quickReplies);
  userInput.focus();
}

init();
</script>
</body>
